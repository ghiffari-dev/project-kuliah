<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f97316" />
    <meta name="description" content="Aplikasi pencatat keuangan offline" />
    <link rel="manifest" href="manifest.json" />
    <title>MoneyTrack</title>
  </head>
  <body>

    <!-- ======== HEADER ======== -->
    <header id="app-header">
      <h1>MoneyTrack</h1>
    </header>

    <!-- ======== MAIN CONTENT ======== -->
    <main id="app-main">

      <!-- Section: Dashboard -->
      <section id="section-dashboard" class="page-section">
        <p>Dashboard</p>
      </section>

      <!-- Section: Daftar Transaksi -->
      <section id="section-transactions" class="page-section">
        <p>Transaksi</p>
      </section>

      <!-- Section: Tambah / Edit Transaksi -->
      <section id="section-form" class="page-section">
        <p>Tambah Transaksi</p>
      </section>

      <!-- Section: Laporan -->
      <section id="section-report" class="page-section">
        <p>Laporan</p>
      </section>

    </main>

    <!-- ======== BOTTOM NAVIGATION ======== -->
    <nav id="bottom-nav">
      <button data-tab="dashboard">Dashboard</button>
      <button data-tab="transactions">Transaksi</button>
      <button data-tab="form">Tambah</button>
      <button data-tab="report">Laporan</button>
    </nav>

  </body>
</html>
